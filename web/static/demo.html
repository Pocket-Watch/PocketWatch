<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>Video Player</title>
    <link rel="stylesheet" href="../css/player.css">
    <style>
        body {
            background-color: #282828;
        }
        #page {
            position: absolute;
            width: 100%;
            height: 100%;
        }
        .demo_input {
            font-size: 20px;
            background-color: #111214;
            color: #f5f6f7;
            border: 1px solid #2a2d30;
            padding: 8px 10px;
            border-radius: 4px;
            outline: none;
            box-sizing: border-box;
        }
        #demo_console_area {
            box-sizing: border-box;
            width: 100%;
            max-width: 100%;
            height: 220px;
            min-height: 120px;
            padding: 12px 14px;
            font-size: 20px;
            resize: vertical;
            overflow: auto;
            line-height: 1.45;
            color: white;
            background: black;
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 8px;
            caret-color: #7ee787;
            white-space: pre-wrap;
            word-break: break-word;
            tab-size: 2;
            outline: none;
            flex-direction: column-reverse;
            flex-grow: 1;
        }
    </style>
</head>

<body>
    <div id="page">
        <video id="video0"></video>
        <br/>

        <input type="url" id="demo_video_url" class="demo_input" size="100" placeholder="Video URL" />
        <input type="url" id="demo_audio_url" class="demo_input" size="100" placeholder="Audio URL" />
        <button onclick="setVideoOnClick()">Set video</button>
        <button onclick="setAudioOnClick()">Set audio</button>
        <button onclick="destroy()">Destroy</button>
        <button onclick="attach()">Attach</button>
        <br>
        <textarea id="demo_console_area" disabled="true" name="console" placeholder="Logs will appear here"></textarea>

    </div>

    <script type="module" src="../js/scratch.js"></script>
</body>

</html>
